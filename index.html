<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Quiz Magique - École des Princesses Savantes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Comic Neue', 'Quicksand', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #f3c4da 100%);
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        .balloon {
            position: fixed;
            bottom: -50px;
            font-size: 40px;
            pointer-events: none;
            z-index: 1000;
            animation: flyUp 3s ease-out forwards;
        }

        @keyframes flyUp {
            0% { bottom: -50px; opacity: 1; transform: rotate(0deg); }
            50% { opacity: 1; transform: rotate(10deg); }
            100% { bottom: 110%; opacity: 0; transform: rotate(-10deg); }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            z-index: 1000;
            animation: fall 2s linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .floating-deco {
            position: fixed;
            pointer-events: none;
            z-index: 0;
        }

        .floating-deco span {
            position: absolute;
            font-size: 2rem;
            animation: float 6s infinite ease-in-out;
            opacity: 0.15;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .screen {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(255, 248, 250, 0.97);
            border-radius: 80px;
            padding: 35px 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.15), 0 0 0 8px rgba(255,192,219,0.3);
            border: 2px solid #ffc0db;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .screen:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 55px rgba(0,0,0,0.2);
        }

        .screen h2 {
            color: #b13e6e;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
            text-shadow: 3px 3px 0 #ffc0e0;
            letter-spacing: 2px;
        }

        button {
            background: linear-gradient(145deg, #e91e63, #c2185b);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            font-size: 1.05rem;
            cursor: pointer;
            margin: 10px 8px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }

        button:hover::before {
            width: 200px;
            height: 200px;
        }

        button:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #b96f8f, #9e5a78);
        }

        .btn-save {
            background: linear-gradient(145deg, #4caf50, #2e7d32);
        }

        .quiz-list {
            background: rgba(255,240,247,0.9);
            border-radius: 50px;
            padding: 20px;
            margin: 20px 0;
            backdrop-filter: blur(4px);
        }

        .quiz-item {
            background: white;
            border-radius: 45px;
            padding: 15px 25px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f3a7c1;
            transition: all 0.3s;
            cursor: pointer;
        }

        .quiz-item:hover {
            transform: translateX(8px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-color: #e91e63;
        }

        .quiz-title {
            flex: 1;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .delete-quiz {
            background: #c62828;
            padding: 8px 18px;
            font-size: 0.8rem;
            margin: 0 5px;
        }

        .play-quiz-btn {
            background: #e91e63;
            padding: 8px 18px;
            font-size: 0.8rem;
            margin: 0;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .question-counter {
            background: #ffe0ec;
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: #b13e6e;
            font-size: 0.9rem;
        }

        .question-frame {
            background: #1a2a1f;
            background-image: radial-gradient(circle at 10% 20%, rgba(255,255,200,0.05) 2%, transparent 2.5%);
            background-size: 30px 30px;
            border-radius: 50px;
            padding: 40px 25px;
            margin: 20px 0;
            text-align: center;
            font-size: 1.9rem;
            font-weight: bold;
            color: #f5f5dc;
            text-shadow: 0 0 5px #8bc34a;
            box-shadow: 0 25px 35px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,200,0.3);
            border: 3px solid #cdb38c;
            min-height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            font-family: 'Courier New', 'Segoe UI', monospace;
            letter-spacing: 1px;
            position: relative;
        }

        .question-frame::before {
            content: "✏️";
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 1.8rem;
            opacity: 0.5;
        }

        .question-frame::after {
            content: "📖";
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 1.8rem;
            opacity: 0.5;
        }

        .options-area {
            margin: 30px 0;
            gap: 18px;
        }

        .options-vertical {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .options-horizontal {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
        }

        .options-paired {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .option-card {
            background: linear-gradient(145deg, #fff5f8, #ffe4ed);
            border-radius: 60px;
            padding: 18px 24px;
            font-size: 1.15rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            text-align: center;
            border: 2px solid #e0a7c2;
            font-weight: 600;
            color: #4a2a3a;
            box-shadow: 0 5px 12px rgba(0,0,0,0.08);
            opacity: 0;
            transform: translateY(20px);
            animation: slideInOption 0.45s forwards;
        }

        @keyframes slideInOption {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .option-card:hover {
            background: linear-gradient(145deg, #e91e63, #c2185b);
            color: white;
            transform: scale(1.03) translateY(-5px);
            box-shadow: 0 12px 25px rgba(233,30,99,0.4);
            border-color: #ff80ab;
        }

        .timer-box {
            text-align: center;
            font-size: 2.8rem;
            font-weight: bold;
            background: linear-gradient(145deg, #2c1e2a, #1a0f18);
            display: inline-block;
            width: 100%;
            padding: 12px;
            border-radius: 100px;
            margin: 15px 0;
            letter-spacing: 5px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.1);
            color: #ffd966;
            font-family: monospace;
            border: 1px solid #ffb347;
        }

        .result-box {
            text-align: center;
            font-size: 1.5rem;
            padding: 30px;
            background: linear-gradient(145deg, #fff0f7, #ffe6f0);
            border-radius: 70px;
            margin-top: 25px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border-radius: 60px;
            border: 2px solid #f0a0bc;
            background: #fff9fc;
            font-size: 1rem;
            transition: 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #e91e63;
            box-shadow: 0 0 0 3px rgba(233,30,99,0.2);
        }

        .hidden {
            display: none;
        }

        .start-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2a1a2a, #4a2a3a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            animation: fadeOut 2.8s forwards;
            animation-delay: 2.2s;
        }

        .start-animation h1 {
            color: #ffd700;
            font-size: 3.5rem;
            text-align: center;
            animation: bounce 0.6s ease;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-35px); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .character-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .cute-girl {
            position: relative;
            width: 160px;
            height: 160px;
            animation: bounceSoft 2s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes bounceSoft {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .cute-girl svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
        }

        .happy-animation {
            animation: happyHop 0.6s infinite ease-in-out;
        }

        @keyframes happyHop {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-12px) rotate(-5deg); }
            75% { transform: translateY(-12px) rotate(5deg); }
        }

        .sad-animation {
            animation: sadShake 0.5s infinite ease-in-out;
        }

        @keyframes sadShake {
            0%, 100% { transform: translateX(0px); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .neutral-animation {
            animation: neutralSway 2s infinite ease-in-out;
        }

        @keyframes neutralSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(4deg); }
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .crown-badge {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffd700;
            color: #b13e6e;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .welcome-message {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #b96f8f;
        }

        .encouragement-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(233,30,99,0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 2000;
            animation: fadeOutText 1.5s forwards;
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes fadeOutText {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            20% { transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); visibility: hidden; }
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .save-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 2000;
            animation: slideInRight 0.5s ease, fadeOutDelayed 2s ease forwards;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOutDelayed {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

<div class="floating-deco">
    <span style="top: 10%; left: 5%;">🌸</span>
    <span style="top: 20%; right: 8%;">💖</span>

    <span style="bottom: 25%; right: 15%;">🎀</span>
    <span style="top: 40%; left: 2%;">✨</span>
    <span style="top: 70%; right: 5%;">🦄</span>
</div>

<!-- Main Menu -->
<div id="mainMenuScreen" class="screen">
    <div class="crown-badge">👑 Académie des Princesses 👑</div>
    <h2>🌸🎮 Menu des Jeux 🎮🌸</h2>
    <div class="welcome-message">✨ Bienvenue, ma petite princesse du savoir ! ✨</div>
    <div style="display: flex; flex-direction: column; gap: 18px;">
        <button id="goToQuizBtn">📖 Jeu du Quiz</button>
        <button id="goToMemoryBtn">🧠 Jeu de Mémoire</button>
        <button id="goToPuzzleBtn">🧩 Puzzle Magique</button>
        <button id="goToGuessBtn">💬 Devine le Mot</button>

</div>

<!-- Quiz Choice Screen -->
<div id="quizChoiceScreen" class="screen hidden">
    <div class="crown-badge">📚 Plateforme Quiz</div>
    <h2>📖 Création & Jeux</h2>
    <div style="text-align: center;">
        <button id="useOldQuizBtn">📚 Utiliser un ancien quiz</button>

    <div id="oldQuizListArea" class="quiz-list hidden">

            <h3>📋 Quiz sauvegardés :</h3>
            <button id="backupNowBtn" class="btn-save" style="padding: 8px 16px; font-size: 0.8rem;">💾 Sauvegarder tout</button>
        </div>
        <div id="savedQuizzesList"></div>
        <div id="noQuizMsg" style="color:#b96f8f; text-align:center; padding:20px;">💔 Aucun quiz ancien, créez-en un nouveau !</div>

<!-- Create Quiz Screen -->
<div id="createQuizScreen" class="screen hidden">
    <div class="crown-badge">✏️ Création</div>
    <h2>✏️ Nouveau Quiz</h2>
    <input type="text" id="quizTitle" placeholder="Titre du quiz" value="Mon Quiz">

        <button class="back-home btn-secondary">🏠 Retour</button>

<!-- Play Quiz Screen -->
<div id="playQuizScreen" class="screen hidden">
    <div class="crown-badge">🎮 En jeu</div>
    <h2 id="playingQuizTitle">🎀 Quiz 🎀</h2>
    <div class="timer-box" id="timerDisplay">30</div>
    <div class="question-header">
        <div></div>
        <div class="question-counter" id="questionCounter">1/3</div>

    <div id="resultScreen" class="hidden result-box"></div>
    <div class="nav-buttons">
        <button class="back-home btn-secondary" id="exitPlayBtn">🚪 Quitter le jeu</button>

</div>

<script>
    // ==================== SONS PERSONNALISÉS ====================
    let audioCtxGlobal = null;
    
    function initAudio() {
        try {
            audioCtxGlobal = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) { console.log("Audio non supporté"); }
    }
    
    function playCorrectSound() {
        if (!audioCtxGlobal) initAudio();
        if (!audioCtxGlobal) return;
        try {
            if (audioCtxGlobal.state === 'suspended') audioCtxGlobal.resume();
            const now = audioCtxGlobal.currentTime;
            const osc1 = audioCtxGlobal.createOscillator();
            const gain1 = audioCtxGlobal.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtxGlobal.destination);
            osc1.frequency.value = 880;
            gain1.gain.value = 0.2;
            osc1.start();
            gain1.gain.exponentialRampToValueAtTime(0.00001, now + 0.2);
            osc1.stop(now + 0.2);
            
            const osc2 = audioCtxGlobal.createOscillator();
            const gain2 = audioCtxGlobal.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtxGlobal.destination);
            osc2.frequency.value = 1046.5;
            gain2.gain.value = 0.2;
            osc2.start(now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.00001, now + 0.35);
            osc2.stop(now + 0.35);
            
            const osc3 = audioCtxGlobal.createOscillator();
            const gain3 = audioCtxGlobal.createGain();
            osc3.connect(gain3);
            gain3.connect(audioCtxGlobal.destination);
            osc3.frequency.value = 1174.66;
            gain3.gain.value = 0.15;
            osc3.start(now + 0.25);
            gain3.gain.exponentialRampToValueAtTime(0.00001, now + 0.45);
            osc3.stop(now + 0.45);
        } catch(e) {}
    }
    
    function playWrongSound() {
        if (!audioCtxGlobal) initAudio();
        if (!audioCtxGlobal) return;
        try {
            if (audioCtxGlobal.state === 'suspended') audioCtxGlobal.resume();
            const now = audioCtxGlobal.currentTime;
            const osc = audioCtxGlobal.createOscillator();
            const gain = audioCtxGlobal.createGain();
            osc.connect(gain);
            gain.connect(audioCtxGlobal.destination);
            osc.frequency.value = 523.25;
            gain.gain.value = 0.25;
            osc.start();
            osc.frequency.exponentialRampToValueAtTime(293.66, now + 0.6);
            gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.7);
            osc.stop(now + 0.7);
        } catch(e) {}
    }
    
    function playTimeoutSound() {
        if (!audioCtxGlobal) initAudio();
        if (!audioCtxGlobal) return;
        try {
            if (audioCtxGlobal.state === 'suspended') audioCtxGlobal.resume();
            const now = audioCtxGlobal.currentTime;
            for (let i = 0; i < 3; i++) {
                const osc = audioCtxGlobal.createOscillator();
                const gain = audioCtxGlobal.createGain();
                osc.connect(gain);
                gain.connect(audioCtxGlobal.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.2;
                const startTime = now + (i * 0.2);
                osc.start(startTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, startTime + 0.15);
                osc.stop(startTime + 0.15);
            }
        } catch(e) {}
    }

    // ==================== بالونات و كونفيتي ====================
    function showBalloonsAndConfetti() {
        const balloonColors = ['🎈', '🎈', '🎈', '🎈', '🎈', '🎈', '🎀', '✨', '⭐', '🌸', '💖'];
        for(let i = 0; i < 15; i++) {
            setTimeout(() => {
                let balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = balloonColors[Math.floor(Math.random() * balloonColors.length)];
                balloon.style.left = Math.random() * 100 + '%';
                balloon.style.fontSize = (30 + Math.random() * 30) + 'px';
                balloon.style.animationDuration = (2 + Math.random() * 2) + 's';
                document.body.appendChild(balloon);
                setTimeout(() => balloon.remove(), 3000);
            }, i * 80);
        }
        
        const colors = ['#ff0', '#f0f', '#0ff', '#ff69b4', '#ffa500', '#4caf50', '#e91e63', '#2196f3'];
        for(let i = 0; i < 100; i++) {
            setTimeout(() => {
                let confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.width = (5 + Math.random() * 10) + 'px';
                confetti.style.height = (5 + Math.random() * 10) + 'px';
                confetti.style.animationDuration = (1 + Math.random() * 1.5) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2000);
            }, i * 30);
        }
    }

    function showEncouragement(message, isCorrect) {
        let div = document.createElement('div');
        div.className = 'encouragement-text';
        div.textContent = message;
        div.style.background = isCorrect ? 'linear-gradient(145deg, #4caf50, #2e7d32)' : 'linear-gradient(145deg, #ff9800, #e65100)';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 1500);
    }

    function showSaveNotification(message) {
        let div = document.createElement('div');
        div.className = 'save-notification';
        div.textContent = message;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2500);
    }

    // ==================== فتاة كيووت ====================
    function getCuteGirlSVG(mood) {
        let eyes, mouth, cheeks, animationClass;
        
        if(mood === 'veryHappy') {
            eyes = `<path d="M52,68 Q56,62 60,68" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <path d="M78,68 Q82,62 86,68" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
            mouth = `<path d="M61,82 Q69,94 77,82" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
            cheeks = `<ellipse cx="48" cy="76" rx="8" ry="5" fill="#ffaaaa" opacity="0.7"/>
                      <ellipse cx="90" cy="76" rx="8" ry="5" fill="#ffaaaa" opacity="0.7"/>`;
            animationClass = "happy-animation";
        }
        else if(mood === 'happy') {
            eyes = `<path d="M52,68 Q56,63 60,68" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <path d="M78,68 Q82,63 86,68" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
            mouth = `<path d="M63,82 Q69,92 75,82" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
            cheeks = `<ellipse cx="48" cy="76" rx="7" ry="4" fill="#ffaaaa" opacity="0.6"/>
                      <ellipse cx="90" cy="76" rx="7" ry="4" fill="#ffaaaa" opacity="0.6"/>`;
            animationClass = "happy-animation";
        }
        else if(mood === 'neutral') {
            eyes = `<circle cx="56" cy="68" r="3.5" fill="#4a2a3a"/>
                    <circle cx="82" cy="68" r="3.5" fill="#4a2a3a"/>`;
            mouth = `<line x1="65" y1="82" x2="73" y2="82" stroke="#4a2a3a" stroke-width="2.5" stroke-linecap="round"/>`;
            cheeks = `<ellipse cx="48" cy="76" rx="6" ry="3.5" fill="#ffaaaa" opacity="0.4"/>
                      <ellipse cx="90" cy="76" rx="6" ry="3.5" fill="#ffaaaa" opacity="0.4"/>`;
            animationClass = "neutral-animation";
        }
        else {
            eyes = `<path d="M52,68 Q56,72 60,68" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <path d="M78,68 Q82,72 86,68" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
            mouth = `<path d="M63,85 Q69,77 75,85" stroke="#4a2a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
            cheeks = `<ellipse cx="48" cy="76" rx="7" ry="4" fill="#bb88aa" opacity="0.5"/>`;
            animationClass = "sad-animation";
        }
        
        return `
            <div class="character-container">
                <div class="cute-girl ${animationClass}">
                    <svg viewBox="0 0 140 140">
                        <rect x="45" y="90" width="50" height="38" rx="12" fill="#e91e63"/>
                        <rect x="50" y="122" width="40" height="12" rx="6" fill="#ad1457"/>
                        <circle cx="70" cy="62" r="28" fill="#fdd5b5"/>
                        <path d="M42,45 Q70,30 98,45 Q100,52 98,58 Q80,52 70,55 Q60,52 42,58 Q40,52 42,45Z" fill="#6a1b4d"/>
                        <path d="M42,45 Q52,38 62,41 L62,52 Q52,49 42,52Z" fill="#4a0e35"/>
                        <path d="M98,45 Q88,38 78,41 L78,52 Q88,49 98,52Z" fill="#4a0e35"/>
                        <path d="M42,45 Q55,35 70,37 Q85,35 98,45" fill="#7b245a" stroke="#6a1b4d" stroke-width="1"/>
                        ${eyes}
                        ${cheeks}
                        ${mouth}
                        <path d="M68,73 L70,75 L72,73" stroke="#e0a080" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                        <path d="M48,64 L44,60" stroke="#4a2a3a" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M64,64 L68,60" stroke="#4a2a3a" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M76,64 L72,60" stroke="#4a2a3a" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M92,64 L96,60" stroke="#4a2a3a" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </div>
            </div>
        `;
    }

    // ==================== STOCKAGE ====================
    let quizzesList = [];

    function loadQuizzes() {
        try {
            let stored = localStorage.getItem("PrincessQuizDatabase");
            if(stored && JSON.parse(stored).length) quizzesList = JSON.parse(stored);
            else setDefaultQuizzes();
        } catch(e) { setDefaultQuizzes(); }
    }

    function setDefaultQuizzes() {
        quizzesList = [{
            id: Date.now() + "_default",
            title: "Français Facile",
            createdAt: new Date().toLocaleString(),
            questions: [
                { text: "Quel est le contraire de 'grand' ?", options: ["petit", "grand", "long", "haut"], correctIndex: 0 },
                { text: "Comment dit-on 'مرحبا' en français ?", options: ["Merci", "Bonjour", "Salut", "Bonsoir"], correctIndex: 1 },
                { text: "Le féminin de 'chat' ?", options: ["chatte", "chate", "chaton", "chienne"], correctIndex: 0 }
            ]
        }];
        saveQuizzes();
    }

    function saveQuizzes() { 
        localStorage.setItem("PrincessQuizDatabase", JSON.stringify(quizzesList));
        showSaveNotification("✅ Quiz sauvegardé !");
    }
    
    function displayOldQuizzes() {
        let container = document.getElementById("savedQuizzesList");
        if(!container) return;
        container.innerHTML = "";
        if(quizzesList.length === 0) { document.getElementById("noQuizMsg").style.display = "block"; return; }
        document.getElementById("noQuizMsg").style.display = "none";
        quizzesList.forEach((quiz, idx) => {
            let div = document.createElement("div");
            div.className = "quiz-item";
            div.innerHTML = `<span class="quiz-title">📖 ${quiz.title} (${quiz.questions.length} questions)</span>
                <div><button class="delete-quiz" data-idx="${idx}">🗑️ Supprimer</button>
                <button class="play-quiz-btn" data-idx="${idx}">🎮 Jouer</button></div>`;
            container.appendChild(div);
        });
        document.querySelectorAll(".delete-quiz").forEach(btn => btn.addEventListener("click", (e) => {
            let idx = parseInt(btn.getAttribute("data-idx"));
            if(confirm("Supprimer ce quiz ?")) { quizzesList.splice(idx,1); saveQuizzes(); displayOldQuizzes(); }
        }));
        document.querySelectorAll(".play-quiz-btn").forEach(btn => btn.addEventListener("click", (e) => {
            let idx = parseInt(btn.getAttribute("data-idx"));
            startPlayingThisQuiz(quizzesList[idx]);
        }));
    }

    // ==================== JEU ====================
    let currentGameQuiz = null, currentQIndex = 0, playerScore = 0, timerInterval = null, timeLeft = 30, canAnswer = true, waitingForNext = false, isTypingQuestion = false;
    
    async function typeOnBoard(element, text, speed = 40) {
        element.innerHTML = "";
        for(let i = 0; i < text.length; i++) {
            element.innerHTML += text[i];
            if(i < text.length - 1) element.innerHTML += `<span style="display:inline-block; width:3px; height:1.5rem; background:#ffd966; margin-left:2px; animation: blinkCursor 1s infinite;"></span>`;
            await new Promise(resolve => setTimeout(resolve, speed));
            if(i < text.length - 1) element.innerHTML = element.innerHTML.replace('<span style="display:inline-block; width:3px; height:1.5rem; background:#ffd966; margin-left:2px; animation: blinkCursor 1s infinite;"></span>', '');
        }
        element.innerHTML = text;
    }

    function displayOptionsSmartly(options, correctIdx, onComplete) {
        let container = document.getElementById("optionsArea");
        container.innerHTML = "";
        container.className = options.length === 4 ? "options-paired" : (options.length % 2 === 0 ? "options-horizontal" : "options-vertical");
        let idx = 0;
        function showNext() {
            if(idx >= options.length) { if(onComplete) onComplete(); return; }
            let optDiv = document.createElement("div");
            optDiv.className = "option-card";
            optDiv.innerText = options[idx];
            optDiv.setAttribute("data-opt-index", idx);
            optDiv.onclick = (function(selected) { return function() { if(canAnswer && !waitingForNext && !isTypingQuestion) checkAnswer(selected, correctIdx); }; })(idx);
            container.appendChild(optDiv);
            idx++;
            setTimeout(showNext, 150);
        }
        showNext();
    }

    function startPlayingThisQuiz(quiz) { 
        currentGameQuiz = JSON.parse(JSON.stringify(quiz)); 
        currentQIndex = 0; 
        playerScore = 0; 
        waitingForNext = false; 
        showScreen("playQuizScreen"); 
        document.getElementById("playingQuizTitle").innerHTML = `🎀 ${currentGameQuiz.title} 🎀`; 
        loadCurrentQuestion(); 
    }
    
    function stopTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = null; }
    
    async function loadCurrentQuestion() {
        canAnswer = true; waitingForNext = false; isTypingQuestion = true; stopTimer();
        let total = currentGameQuiz.questions.length;
        document.getElementById("questionCounter").innerHTML = `${currentQIndex+1}/${total}`;
        let q = currentGameQuiz.questions[currentQIndex];
        timeLeft = 30; document.getElementById("timerDisplay").innerText = timeLeft;
        document.getElementById("timerDisplay").style.display = "block";
        document.getElementById("optionsArea").style.display = "flex";
        document.getElementById("questionFrame").style.display = "flex";
        document.getElementById("resultScreen").classList.add("hidden");
        document.getElementById("questionFrame").style.background = "#1a2a1f";
        document.getElementById("optionsArea").innerHTML = "";
        await typeOnBoard(document.getElementById("questionFrame"), q.text, 40);
        isTypingQuestion = false;
        displayOptionsSmartly(q.options, q.correctIndex, () => {
            timerInterval = setInterval(() => {
                if(!canAnswer || waitingForNext || isTypingQuestion) return;
                if(timeLeft <= 1) {
                    if(canAnswer && !waitingForNext) {
                        canAnswer = false; waitingForNext = true; stopTimer();
                        document.getElementById("questionFrame").style.background = "#4a1a1a";
                        playTimeoutSound();
                        showEncouragement("⏰ Temps écoulé ! Dépêche-toi la prochaine fois ! ⏰", false);
                        setTimeout(() => goToNextQuestion(), 1300);
                    }
                } else { timeLeft--; document.getElementById("timerDisplay").innerText = timeLeft; }
            }, 1000);
        });
    }
    
    function checkAnswer(selectedIdx, correctIdx) {
        if(!canAnswer || waitingForNext || isTypingQuestion) return;
        canAnswer = false; waitingForNext = true; stopTimer();
        let isCorrect = (selectedIdx === correctIdx);
        if(isCorrect) {
            playerScore++; document.getElementById("questionFrame").style.background = "#2a6a2a";
            playCorrectSound();
            showBalloonsAndConfetti();
            showEncouragement("🎉 Yaay ! Très bien ma princesse ! 🎉", true);
        } else {
            document.getElementById("questionFrame").style.background = "#7a2a2a";
            playWrongSound();
            showEncouragement("😢 Oh non... Ce n'est pas grave, la prochaine fois sera meilleure ! 😢", false);
        }
        setTimeout(() => goToNextQuestion(), 1300);
    }
    
    function goToNextQuestion() { 
        if(currentQIndex + 1 < currentGameQuiz.questions.length) { 
            currentQIndex++; 
            loadCurrentQuestion(); 
        } else { 
            finishQuiz(); 
        } 
    }
    
    function finishQuiz() {
        stopTimer();
        let total = currentGameQuiz.questions.length;
        let finalNote = Math.round((playerScore/total)*200)/10;
        let mood, message;
        if(finalNote >= 16) { mood="veryHappy"; message="✨ Incroyable ! Tu es une vraie princesse du savoir ! ✨"; showBalloonsAndConfetti(); }
        else if(finalNote >= 12) { mood="happy"; message="🌸 Excellent travail ma chérie ! Continue comme ça ! 🌸"; showBalloonsAndConfetti(); }
        else if(finalNote >= 8) { mood="neutral"; message="📚 Très bien ! Un petit effort et tu deviendras championne ! 📚"; }
        else { mood="sad"; message="💕 N'abandonne pas ma princesse ! Je crois en toi ! 💕"; }
        let characterSVG = getCuteGirlSVG(mood);
        let resultDiv = document.getElementById("resultScreen");
        resultDiv.innerHTML = `<div style="text-align:center">${characterSVG}<div style="font-size:3rem;">⭐</div><p style="font-size:2rem;">⭐ Note : ${finalNote}/20 ⭐</p><p>✅ ${playerScore}/${total} correctes ✅</p><p>${message}</p><div><button id="restartQuizBtn">🔄 Rejouer</button><button id="exitQuizToMenuBtn">🏠 Menu</button></div></div>`;
        resultDiv.classList.remove("hidden");
        document.getElementById("optionsArea").style.display = "none";
        document.getElementById("questionFrame").style.display = "none";
        document.getElementById("timerDisplay").style.display = "none";
        document.getElementById("restartQuizBtn")?.addEventListener("click", () => startPlayingThisQuiz(currentGameQuiz));
        document.getElementById("exitQuizToMenuBtn")?.addEventListener("click", () => showScreen("mainMenuScreen"));
    }

    function showScreen(screenId) { 
        document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden")); 
        document.getElementById(screenId).classList.remove("hidden"); 
    }

    // ==================== CRÉATION DE QUIZ INTERACTIF (avec prompts) ====================
    document.getElementById("startBuildQuestionsBtn")?.addEventListener("click", () => {
        let title = document.getElementById("quizTitle").value.trim() || "Mon Quiz";
        let nbQuestions = parseInt(document.getElementById("nbQuestions").value);
        let nbOptions = parseInt(document.getElementById("nbOptions").value);
        
        if(isNaN(nbQuestions) || nbQuestions < 1) nbQuestions = 2;
        if(isNaN(nbOptions) || nbOptions < 2) nbOptions = 2;
        if(nbOptions > 5) nbOptions = 5;
        if(nbQuestions > 12) nbQuestions = 12;
        
        let questionsArray = [];
        
        // Parcourir chaque question
        for(let q = 0; q < nbQuestions; q++) {
            // Demander le texte de la question
            let questionText = prompt(`📝 QUESTION ${q+1}/${nbQuestions}\n\nEntrez le texte de la question :`);
            if(questionText === null) {
                alert("Création annulée.");
                return;
            }
            if(questionText.trim() === "") questionText = `Question ${q+1}`;
            
            // Demander les options
            let options = [];
            for(let opt = 0; opt < nbOptions; opt++) {
                let optionText = prompt(`🔹 OPTION ${opt+1}/${nbOptions} pour la question ${q+1}\n\nQuestion: "${questionText}"\nEntrez le texte de l'option ${opt+1} :`);
                if(optionText === null) {
                    alert("Création annulée.");
                    return;
                }
                if(optionText.trim() === "") optionText = `Option ${opt+1}`;
                options.push(optionText);
            }
            
            // Demander l'index de la bonne réponse
            let correctIndex = -1;
            while(correctIndex < 0 || correctIndex >= nbOptions) {
                let input = prompt(`✅ BONNE RÉPONSE pour la question ${q+1}\n\nOptions:\n${options.map((opt, idx) => `${idx}: ${opt}`).join("\n")}\n\nEntrez le numéro de la bonne réponse (de 0 à ${nbOptions-1}) :`);
                if(input === null) {
                    alert("Création annulée.");
                    return;
                }
                correctIndex = parseInt(input);
                if(isNaN(correctIndex)) correctIndex = -1;
            }
            
            questionsArray.push({
                text: questionText,
                options: options,
                correctIndex: correctIndex
            });
            
            // Message de progression
            if(q + 1 < nbQuestions) {
                let continuer = confirm(`✅ Question ${q+1} enregistrée !\n\nPasser à la question suivante ?`);
                if(!continuer) {
                    alert("Création annulée.");
                    return;
                }
            }
        }
        
        // Créer et sauvegarder le quiz
        let newQuiz = {
            id: Date.now() + "_" + Math.random(),
            title: title,
            createdAt: new Date().toLocaleString(),
            questions: questionsArray
        };
        
        quizzesList.push(newQuiz);
        saveQuizzes();
        alert(`🎉 Quiz "${title}" créé avec succès !\n📊 ${nbQuestions} questions, ${nbOptions} options par question.`);
        showScreen("quizChoiceScreen");
        displayOldQuizzes();
    });

    // ==================== ÉVÉNEMENTS ====================
    document.getElementById("goToQuizBtn")?.addEventListener("click", () => { loadQuizzes(); showScreen("quizChoiceScreen"); displayOldQuizzes(); });
    document.getElementById("useOldQuizBtn")?.addEventListener("click", () => { loadQuizzes(); displayOldQuizzes(); document.getElementById("oldQuizListArea").classList.remove("hidden"); });
    document.getElementById("createNewQuizBtn")?.addEventListener("click", () => showScreen("createQuizScreen"));
    document.getElementById("backupNowBtn")?.addEventListener("click", () => { saveQuizzes(); showSaveNotification("💾 Sauvegarde effectuée !"); });
    document.querySelectorAll(".back-home").forEach(btn => btn.addEventListener("click", () => { stopTimer(); showScreen("mainMenuScreen"); }));
    document.getElementById("exitPlayBtn")?.addEventListener("click", () => { stopTimer(); showScreen("mainMenuScreen"); });
    
    document.getElementById("goToMemoryBtn")?.addEventListener("click", () => alert("🧠 Jeu de Mémoire : bientôt disponible !"));
    document.getElementById("goToPuzzleBtn")?.addEventListener("click", () => alert("🧩 Puzzle Magique : bientôt disponible !"));
    document.getElementById("goToGuessBtn")?.addEventListener("click", () => alert("💬 Devine le Mot : bientôt disponible !"));
    document.getElementById("goToColoringBtn")?.addEventListener("click", () => alert("🎨 Coloriage Enchanté : bientôt disponible !"));
    
    initAudio();
    loadQuizzes();
</script>
